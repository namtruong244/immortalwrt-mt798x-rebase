name: Build ImmortalWrt for NR3053

# Luồng này chỉ chạy khi bạn bấm nút thủ công
on:
  workflow_dispatch:

jobs:
  build:
    name: Compile Firmware
    # Mượn server Ubuntu 22.04 của GitHub
    runs-on: ubuntu-22.04

    steps:
    - name: Tải mã nguồn về server
      uses: actions/checkout@v4

    - name: Cài đặt các gói phụ thuộc (Dependencies)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get -y install build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3-distutils rsync unzip zlib1g-dev file wget curl

    - name: Cập nhật và Cài đặt Feeds (Các ứng dụng đi kèm)
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Khởi tạo cấu hình (Config) cho thiết bị
      run: |
        # Chỉ định dòng chip và tên thiết bị NR3053
        echo "CONFIG_TARGET_mediatek=y" > .config
        echo "CONFIG_TARGET_mediatek_filogic=y" >> .config
        # (Lưu ý: Tên biến DEVICE này có thể thay đổi tùy cấu trúc repo)
        echo "CONFIG_TARGET_mediatek_filogic_DEVICE_viettel_nr3053=y" >> .config
        
        # Lệnh này giúp U-Boot và Preloader tự động được build
        echo "CONFIG_TARGET_PREINIT_DISABLE_FAILSAFE=y" >> .config
        echo "CONFIG_PACKAGE_uboot-mediatek=y" >> .config
        echo "CONFIG_PACKAGE_arm-trusted-firmware-mediatek=y" >> .config
        
        # Tự động đồng bộ các thư viện còn thiếu
        make defconfig

    - name: Tải sẵn các gói mã nguồn (Download packages)
      run: make download -j8

    - name: Tiến hành Biên dịch (Có thể mất 2-3 tiếng)
      run: |
        # Build đa luồng. Nếu lỗi sẽ tự lùi về build 1 luồng để hiện log chi tiết (V=s)
        make -j$(nproc) || make -j1 V=s

    - name: Thu thập và Đăng tải Firmware (Artifacts)
      uses: actions/upload-artifact@v4
      with:
        name: Firmware-NR3053-Completed
        # Chỉ lấy các file cần thiết trong thư mục đích
        path: bin/targets/mediatek/filogic/*
