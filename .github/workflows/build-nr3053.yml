name: Build ImmortalWrt for NR3053 Optimized

on:
  workflow_dispatch:

jobs:
  build:
    name: Compile Core Firmware
    runs-on: ubuntu-22.04

    steps:
    - name: Tải mã nguồn về server
      uses: actions/checkout@v4

    - name: Cài đặt các gói phụ thuộc (Dependencies)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get -y install build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3-distutils rsync unzip zlib1g-dev file wget curl

    - name: Cập nhật và Cài đặt Feeds
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Khởi tạo cấu hình theo tài liệu Repo
      run: |
        # Bước 1: Copy file config nền tảng AX3000 của tác giả
        cp defconfig/mt7981-ax3000.config .config
        
        # Bước 2: Chỉ định chính xác Target Profile cho thiết bị vào .config
        # Nếu build cho VHT-32X6, đổi viettel_nr3053 thành vht_32x6
        echo "CONFIG_TARGET_mediatek=y" >> .config
        echo "CONFIG_TARGET_mediatek_filogic=y" >> .config
        echo "CONFIG_TARGET_mediatek_filogic_DEVICE_viettel_nr3053=y" >> .config
        
        # Bước 3: Đồng bộ và kiểm tra tính toàn vẹn của file cấu hình
        make defconfig

    - name: Tải trước các gói mã nguồn (Download packages)
      run: make download -j8

    - name: Tiến hành Biên dịch (Full Build cho môi trường CI)
      run: make -j$(nproc) || make -j1 V=s

    - name: Thu thập và Đăng tải Firmware (Artifacts)
      uses: actions/upload-artifact@v4
      with:
        name: ImmortalWrt-NR3053-Files
        # Đường dẫn thu thập chính xác các file .bin, .fip, .itb sau khi build xong
        path: bin/targets/mediatek/filogic/*
